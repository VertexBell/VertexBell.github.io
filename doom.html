<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DOOM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#111;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:monospace;
  color:#67CC00;
  overflow:hidden;
}
#status-box{text-align:center;padding:20px}
#progress{margin-top:8px;font-size:.9em;color:#aaa}
#canvas{
  display:block;
  width:960px;
  height:600px;
  max-width:98vw;
  max-height:85vh;
  image-rendering:pixelated;
  border:2px solid #333;
  outline:none;
  cursor:crosshair;
}
#overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.55);
  color:#67CC00;
}
#wrap{position:relative;touch-action:none}
</style>

<script>
window.AudioContext = window.AudioContext || window.webkitAudioContext;
</script>
</head>

<body>

<div id="status-box">
  <div id="status">Descargando...</div>
  <div id="progress"></div>
</div>

<div id="wrap" style="display:none">
  <canvas id="canvas" tabindex="0"></canvas>
  <div id="overlay">Click para jugar</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const wrap = document.getElementById('wrap');
const overlay = document.getElementById('overlay');
const statusEl = document.getElementById('status');
const progressEl = document.getElementById('progress');

canvas.addEventListener('click', () => {
  canvas.focus();
  const req = canvas.requestPointerLock;
  if (req) req.call(canvas);

  // 🔊 UNLOCK AUDIO (CLAVE)
  if (Module?.SDL?.audioContext) {
    Module.SDL.audioContext.resume();
  }
});

document.addEventListener('pointerlockchange', () => {
  overlay.style.display =
    document.pointerLockElement === canvas ? 'none' : 'flex';
});

// ───── MODULE FIX ─────
var Module = {
  canvas: canvas,

  print: t => console.log(t),
  printErr: t => console.error(t),

  SDL_numSimultaneouslyQueuedBuffers: 4,
  SDL_audio: true,

  setStatus: function(text){
    if(text===this.last)return;
    this.last=text;

    const m = text.match(/([^(]+)\((\d+)\/(\d+)\)/);
    if(m){
      statusEl.textContent = m[1];
      progressEl.textContent =
        Math.round(m[2]/m[3]*100) + '%';
    }else{
      statusEl.textContent = text;
      progressEl.textContent = '';
    }
  },

  totalDependencies:0,
  monitorRunDependencies:function(left){
    this.totalDependencies=Math.max(this.totalDependencies,left);

    this.setStatus(left
      ? 'Preparando...'
      : 'Listo');

    if(left===0){
      document.getElementById('status-box').style.display='none';
      wrap.style.display='block';
      canvas.focus();
    }
  }
};
</script>

<!-- DATA + DOOM -->
<script>
Module.arguments = [
  '-c','mount c /',
  '-c','c:',
  '-c','DOOM.EXE'
];
</script>

<script async src="https://js-dos.com/dosbox.js"></script>
<script src="doom-controls.js"></script>

</body>
</html>
